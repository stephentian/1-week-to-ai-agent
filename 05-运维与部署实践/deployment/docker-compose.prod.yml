version: '3.8'

services:
  # ===== Nginx反向代理 =====
  nginx:
    image: nginx:1.25-alpine
    container_name: ai-agent-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
    networks:
      - frontend-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== 前端服务（生产优化）=====
  frontend:
    build:
      context: ../../01-开发基础与环境配置/starter-project/frontend/
      dockerfile: Dockerfile
      target: production
    container_name: ai-agent-frontend-prod
    restart: always
    expose:
      - "80"
    environment:
      - NODE_ENV=production
    networks:
      - frontend-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ===== 后端API服务（生产优化）=====
  backend:
    build:
      context: ../../01-开发基础与环境配置/starter-project/backend/
      dockerfile: Dockerfile
      target: production
    container_name: ai-agent-backend-prod
    restart: always
    expose:
      - "8000"
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=${DATABASE_URL:-sqlite:///./prod.db}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - LOG_LEVEL=INFO
    volumes:
      - app_data:/app/data
      - backend_logs:/app/logs
    depends_on:
      - redis
    networks:
      - frontend-network
      - backend-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===== Redis缓存服务 =====
  redis:
    image: redis:7-alpine
    container_name: ai-agent-redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    networks:
      - backend-network
    deploy:
      resources:
        limits:
          memory: 300M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3

# ===== 网络配置 =====
networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: true  # 内部网络，不暴露到外部

# ===== 数据卷（持久化存储）=====
volumes:
  nginx_logs:
  app_data:
  backend_logs:
  redis_data:
